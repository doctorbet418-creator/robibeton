<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 CrownBet Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #F5C842;
  --gold-light: #FFE083;
  --gold-dark: #C9A020;
  --bg: #080810;
  --bg2: #0E0E1A;
  --bg3: #151525;
  --border: rgba(245,200,66,0.15);
  --border-strong: rgba(245,200,66,0.35);
  --text: #F0F0F8;
  --text-muted: #6868A0;
  --text-dim: #303050;
  --green: #2ECC71;
  --green-bg: rgba(46,204,113,0.08);
  --red: #E74C3C;
  --wa: #25D366;
  --blue: #3B82F6;
  --orange: #F97316;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(245,200,66,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(59,130,246,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-crown {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 20px rgba(245,200,66,0.3);
}

.logo-text {
  font-size: 18px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.logo-sub {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
  -webkit-text-fill-color: var(--text-muted);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--green-bg);
  border: 1px solid rgba(46,204,113,0.2);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--green);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* MAIN LAYOUT */
.main {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 1.5rem;
}

/* STATS */
.stats {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 0.5rem;
}

.stat {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.stat:hover { border-color: var(--border-strong); }

.stat::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 60px;
  border-radius: 0 16px 0 60px;
  background: linear-gradient(135deg, var(--gold), transparent);
  opacity: 0.06;
}

.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.stat-num {
  font-size: 32px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  font-family: 'IBM Plex Mono', monospace;
}

.stat-num.green { color: var(--green); }
.stat-num.blue { color: var(--blue); }
.stat-num.orange { color: var(--orange); }

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 4px;
  margin-bottom: 1.25rem;
}

.tab {
  flex: 1;
  padding: 9px 12px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-radius: 10px;
  font-family: 'Rubik', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.tab:hover { color: var(--text); background: var(--bg3); }

.tab.active {
  background: linear-gradient(135deg, rgba(245,200,66,0.15), rgba(245,200,66,0.05));
  color: var(--gold);
  border: 1px solid var(--border-strong);
}

/* SECTION */
.section { display: none; }
.section.active { display: block; }

/* CARD */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 1rem;
}

.card-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: 0.3px;
}

.card-body { padding: 1rem; }

/* RAFFLE ITEM */
.raffle-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.raffle-item:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.raffle-item.selected {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px var(--gold), 0 8px 24px rgba(245,200,66,0.1);
}

.raffle-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.sport-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.sport-football { background: rgba(46,204,113,0.1); color: #2ECC71; border: 1px solid rgba(46,204,113,0.2); }
.sport-basketball { background: rgba(249,115,22,0.1); color: #F97316; border: 1px solid rgba(249,115,22,0.2); }
.sport-tennis { background: rgba(59,130,246,0.1); color: #60A5FA; border: 1px solid rgba(59,130,246,0.2); }

.raffle-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.raffle-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 14px;
}

.badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 600;
}

.badge-pending { background: rgba(249,115,22,0.1); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); }
.badge-results { background: rgba(46,204,113,0.1); color: var(--green); border: 1px solid rgba(46,204,113,0.2); }
.badge-locked { background: rgba(245,200,66,0.1); color: var(--gold); border: 1px solid rgba(245,200,66,0.2); }

/* PREVIEW */
.preview-image {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 1rem;
  position: relative;
}

.preview-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.preview-text {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-muted);
  white-space: pre-wrap;
  max-height: 180px;
  overflow-y: auto;
  margin-bottom: 1rem;
  font-family: 'IBM Plex Mono', monospace;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-family: 'Rubik', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-primary {
  background: linear-gradient(135deg, var(--wa), #1ea952);
  color: #fff;
  box-shadow: 0 4px 16px rgba(37,211,102,0.2);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(37,211,102,0.3);
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #000;
  box-shadow: 0 4px 16px rgba(245,200,66,0.2);
}

.btn-gold:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(245,200,66,0.3);
}

.btn-ghost {
  background: var(--bg3);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--border-strong);
}

.btn-test {
  background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.05));
  color: var(--blue);
  border: 1px solid rgba(59,130,246,0.3);
}

.btn-test:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(59,130,246,0.1));
  border-color: rgba(59,130,246,0.5);
  transform: translateY(-1px);
}

/* REFRESH BTN */
.btn-refresh {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}

.btn-refresh:hover { color: var(--text); border-color: var(--border-strong); }

/* HISTORY */
.history-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.history-item:last-child { border-bottom: none; }

.history-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.history-info { flex: 1; min-width: 0; }
.history-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-meta { font-size: 11px; color: var(--text-muted); }
.history-status { font-size: 11px; font-weight: 600; color: var(--green); white-space: nowrap; }

/* CONFIG */
.config-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

.config-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  margin-bottom: 14px;
  direction: ltr;
  transition: border-color 0.2s;
}

.config-input:focus { outline: none; border-color: var(--gold-dark); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-dim);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 24px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(46,204,113,0.4); color: var(--green); }
.toast.error { border-color: rgba(231,76,60,0.4); color: var(--red); }
.toast.info { border-color: rgba(59,130,246,0.4); color: var(--blue); }

/* DIVIDER */
.divider {
  height: 1px;
  background: var(--border);
  margin: 1rem 0;
}

/* TEST SECTION */
.test-section {
  background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(59,130,246,0.02));
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 14px;
  padding: 1rem;
  margin-top: 0.5rem;
}

.test-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* LOADING */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* NO SELECT */
.no-select {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem;
  gap: 10px;
  color: var(--text-dim);
  font-size: 13px;
}

/* MEDIA */
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; padding: 1rem; }
  .stats { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-crown">👑</div>
    <div>
      <div class="logo-text">CrownBet</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill" id="waStatus">
      <div class="status-dot"></div>

</div>

<div class="main">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">הגרלות היום</div>
      <div class="stat-num" id="statTotal">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">תוצאות מוכנות</div>

    <!-- TODAY -->

          <button class="btn-refresh" onclick="loadRaffles()">↻ רענן</button>
        </div>
        <div class="card-body" id="resultsList">
          <div class="empty"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="section" id="section-history">
      <div class="card">
        <div class="card-header">
          <div class="card-title">📚 היסטוריית שליחות</div>
        </div>

  <!-- LEFT: Preview -->
  <div style="position:sticky;top:80px;align-self:start;">

      <div class="card-header">

        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://oxraakhcpvthlvjvapay.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94cmFha2hjcHZ0aGx2anZhcGF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzY4MTUsImV4cCI6MjA5MzY1MjgxNX0.dftK8Qb9zjzwEVGRLv4Q54Pqn2SLrzOxUqydIYf3Xd8';

let allRaffles = [];
let selected = null;
let sentHistory = JSON.parse(localStorage.getItem('cb_history') || '[]');
let config = JSON.parse(localStorage.getItem('cb_config') || '{"groupId":"120363408842381633@g.us","server":"https://crownbet-wa-server-production.up.railway.app"}');

// ── INIT ──
loadConfig();
loadRaffles();
checkWAStatus();
renderHistory();

async function checkWAStatus() {
  try {
    const r = await fetch(`${config.server}/api/status`);
    const d = await r.json();
    const el = document.getElementById('waStatus');
    if (d.ready) {
      el.innerHTML = '<div class="status-dot"></div>WA מחובר ✓';
      el.style.color = 'var(--green)';
    } else {
      el.innerHTML = '<div class="status-dot" style="background:var(--orange);box-shadow:0 0 8px var(--orange)"></div>לא מחובר';
      el.style.color = 'var(--orange)';
    }
  } catch { document.getElementById('waStatus').innerHTML = '❌ שגיאת חיבור'; }
}

async function loadRaffles() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const r = await fetch(`${SUPABASE_URL}/rest/v1/raffles?raffle_date=eq.${today}&order=created_at.asc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allRaffles = await r.json();
    renderRaffles();
    renderResults();
    updateStats();
  } catch(e) { showToast('❌ שגיאה בטעינה', 'error'); }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allRaffles.length;
  document.getElementById('statResults').textContent = allRaffles.filter(r => r.results).length;
  document.getElementById('statPending').textContent = allRaffles.filter(r => !r.results).length;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('statSent').textContent = sentHistory.filter(h => h.date === today).length;
}

function sportBadge(s) {
  const m = { football: ['sport-football','⚽ כדורגל'], basketball: ['sport-basketball','🏀 כדורסל'], tennis: ['sport-tennis','🎾 טניס'] };
  const [cls, label] = m[s] || ['sport-football', s];
  return `<span class="sport-badge ${cls}">${label}</span>`;
}

function sportEmoji(s) {
  return { football:'⚽', basketball:'🏀', tennis:'🎾' }[s] || '🏆';
}

function renderRaffles() {
  const el = document.getElementById('rafflesList');
  if (!allRaffles.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><span>אין הגרלות להיום</span></div>`;
    return;
  }
  el.innerHTML = allRaffles.map(r => `
    <div class="raffle-item" onclick="selectRaffle('${r.id}','lottery')" id="item-${r.id}">
      <div class="raffle-top">
        ${sportBadge(r.sport)}
        <span class="badge ${r.is_finished ? 'badge-results' : r.locked ? 'badge-locked' : 'badge-pending'}">
          ${r.is_finished ? '✅ הסתיים' : r.locked ? '🔒 נעול' : '🔓 פתוח'}
        </span>
      </div>
      <div class="raffle-title">${r.match_title || '—'}</div>
      <div class="raffle-meta">
        <span>🏆 ${r.league || ''}</span>
        <span>🕐 ${r.match_time || ''}</span>
        <span>❓ ${r.question_count || 1} שאלות</span>
      </div>
    </div>
  `).join('');
}

function renderResults() {
  const el = document.getElementById('resultsList');
  const withResults = allRaffles.filter(r => r.results);
  if (!withResults.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⏳</div><span>אין תוצאות מוכנות עדיין</span></div>`;
    return;
  }
  el.innerHTML = withResults.map(r => `
    <div class="raffle-item" onclick="selectRaffle('${r.id}','results')" id="res-item-${r.id}">
      <div class="raffle-top">
        ${sportBadge(r.sport)}
        <span class="badge badge-results">✅ תוצאה מוכנה</span>
      </div>
      <div class="raffle-title">${r.match_title || '—'}</div>
      <div class="raffle-meta"><span>📊 ${(r.results || '').substring(0, 40)}...</span></div>
    </div>
  `).join('');
}

function selectRaffle(id, mode) {
  const r = allRaffles.find(x => x.id === id);
  if (!r) return;
  selected = { ...r, mode };

  document.querySelectorAll('.raffle-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById((mode === 'results' ? 'res-' : '') + 'item-' + id);
  if (el) el.classList.add('selected');

  const imageUrl = mode === 'results' ? (r.results_image_url || r.image_url) : r.image_url;
  const text = mode === 'results' ? (r.results || '') : (r.raffle_text || '');

  document.getElementById('previewContent').innerHTML = `
    <div class="preview-image">
      ${imageUrl ? `<img src="${imageUrl}" onerror="this.parentElement.innerHTML='<span style=color:var(--text-dim)>אין תמונה</span>'">` : '<span style="color:var(--text-dim);font-size:13px">אין תמונה</span>'}
    </div>
    <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:1px">
      ${mode === 'results' ? '📊 טקסט תוצאות' : '📝 טקסט הגרלה'}
    </div>
    <div class="preview-text">${text || 'אין טקסט'}</div>
    <button class="btn btn-primary" onclick="sendToWA()" ${!config.groupId ? 'disabled' : ''}>
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      ${mode === 'results' ? 'שלח תוצאות לקבוצה' : 'שלח הגרלה לקבוצה'}
    </button>
    <button class="btn btn-ghost" onclick="copyText()">📋 העתק טקסט</button>
  `;
}

async function sendToWA() {
  if (!selected || !config.groupId) return;
  const { mode, image_url, results_image_url, raffle_text, results, match_title, id } = selected;
  const imageUrl = mode === 'results' ? (results_image_url || image_url) : image_url;
  const text = mode === 'results' ? results : raffle_text;

  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ שולח...'; }

  try {
    let res;
    if (imageUrl) {
      res = await fetch(`${config.server}/api/sendImage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatId: config.groupId, url: imageUrl, caption: text, raffleId: id })
      });
    } else {
      res = await fetch(`${config.server}/api/sendTextWithId`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatId: config.groupId, content: text, raffleId: id })
      });
    }
    if (!res.ok) throw new Error('שגיאה');
    sentHistory.unshift({ id, sport: selected.sport, title: match_title, mode, date: new Date().toISOString().split('T')[0], time: new Date().toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' }) });
    localStorage.setItem('cb_history', JSON.stringify(sentHistory.slice(0, 50)));
    updateStats();
    renderHistory();
    showToast('✅ נשלח בהצלחה!', 'success');
  } catch(e) {
    showToast('❌ שגיאה בשליחה', 'error');
  } finally {
    selectRaffle(selected.id, mode);
  }
}

function copyText() {
  if (!selected) return;
  const text = selected.mode === 'results' ? selected.results : selected.raffle_text;
  navigator.clipboard.writeText(text || '').then(() => showToast('📋 הועתק!', 'success'));
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!sentHistory.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><span>אין היסטוריה עדיין</span></div>`;
    return;
  }
  el.innerHTML = sentHistory.map(h => `
    <div class="history-item">
      <div class="history-icon">${sportEmoji(h.sport)}</div>
      <div class="history-info">
        <div class="history-title">${h.title}</div>
        <div class="history-meta">${h.date} · ${h.time} · ${h.mode === 'results' ? 'תוצאות' : 'הגרלה'}</div>
      </div>
      <div class="history-status">✓ נשלח</div>
    </div>
  `).join('');
}

function saveConfig() {
  config = { groupId: document.getElementById('cfgGroupId').value.trim(), server: document.getElementById('cfgServer').value.trim() };
  localStorage.setItem('cb_config', JSON.stringify(config));
  showToast('✅ הגדרות נשמרו!', 'success');
  checkWAStatus();
}

function loadConfig() {
  document.getElementById('cfgGroupId').value = config.groupId || '';
  document.getElementById('cfgServer').value = config.server || '';
}

async function testWA() {
  try {
    const r = await fetch(`${config.server}/api/status`);
    const d = await r.json();
    showToast(d.ready ? '✅ WhatsApp מחובר!' : '❌ לא מחובר', d.ready ? 'success' : 'error');
  } catch { showToast('❌ לא מצליח להתחבר לשרת', 'error'); }
}

async function testSendMsg() {
  if (!config.groupId) { showToast('❌ הגדר Group ID קודם', 'error'); return; }
  try {
    await fetch(`${config.server}/api/sendText`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId: config.groupId, content: '🧪 הודעת טסט מפאנל הניהול של CrownBet 👑' })
    });
    showToast('✅ הודעת טסט נשלחה!', 'success');
  } catch { showToast('❌ שגיאה בשליחה', 'error'); }
}

function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  btn.classList.add('active');
  selected = null;
  document.getElementById('previewContent').innerHTML = `<div class="no-select"><div style="font-size:40px;opacity:0.3">👆</div><span>בחר הגרלה מהרשימה</span></div>`;
  if (name === 'history') renderHistory();
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
